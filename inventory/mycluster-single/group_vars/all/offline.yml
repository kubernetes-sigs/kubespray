# ========================= 全局基础配置 =========================
# 注意：这里是“命名空间前缀”，不是单仓库扁平 tag 方案
# 例如最终镜像应为：registry.cn-hangzhou.aliyuncs.com/mocloud/kube-apiserver:v1.34.3
registry_host: "registry.cn-hangzhou.aliyuncs.com/mocloud"
files_repo: "http://192.168.194.226/k8s"
registry_username: "xxx"
registry_password: "xxx"

# 容器仓库统一前缀
kube_image_repo: "{{ registry_host }}"
gcr_image_repo: "{{ registry_host }}"
quay_image_repo: "{{ registry_host }}"
docker_image_repo: "{{ registry_host }}"
github_image_repo: "{{ registry_host }}"

# ========================= 全扁平镜像命名（无中间路径） =========================
# 目标格式：registry.cn-hangzhou.aliyuncs.com/mocloud/<image-name>:<tag>

# Docker Hub 基础镜像在当前仓库中同样是扁平命名，不带 library 前缀
kubeadm_image_repo: "{{ registry_host }}"
nginx_image_repo: "{{ registry_host }}/nginx"
haproxy_image_repo: "{{ registry_host }}/haproxy"
registry_image_repo: "{{ registry_host }}/registry"

# K8s / DNS / 控制面相关
etcd_image_repo: "{{ registry_host }}/etcd"
etcd_image_tag: "v{{ etcd_version }}"
pod_infra_image_repo: "{{ registry_host }}/pause"
pod_infra_image_tag: "{{ pod_infra_version }}"
coredns_image_repo: "{{ registry_host }}/coredns"
coredns_image_tag: "v1.12.1"
dnsautoscaler_image_repo: "{{ registry_host }}/cluster-proportional-autoscaler"
dnsautoscaler_image_tag: "v{{ dnsautoscaler_version }}"
metrics_server_image_repo: "{{ registry_host }}/metrics-server"
metrics_server_image_tag: "v{{ metrics_server_version }}"
ingress_nginx_controller_image_repo: "{{ registry_host }}/ingress-nginx-controller"
ingress_nginx_controller_image_tag: "v{{ ingress_nginx_version }}"
ingress_nginx_opentelemetry_image_repo: "{{ registry_host }}/ingress-nginx-opentelemetry"
ingress_nginx_opentelemetry_image_tag: "v20230721-3e2062ee5"
ingress_nginx_kube_webhook_certgen_image_repo: "{{ registry_host }}/ingress-nginx-kube-webhook-certgen"
ingress_nginx_kube_webhook_certgen_image_tag: "v1.6.3"

# 网络组件
flannel_image_repo: "{{ registry_host }}/flannel"
flannel_image_tag: "v{{ flannel_version }}"
flannel_init_image_repo: "{{ registry_host }}/flannel-cni-plugin"
flannel_init_image_tag: "v{{ flannel_cni_version }}"
kube_vip_image_repo: "{{ registry_host }}/kube-vip"
kube_vip_image_tag: "v{{ kube_vip_version }}"

# Calico
calico_node_image_repo: "{{ registry_host }}/calico-node"
calico_node_image_tag: "v{{ calico_version }}"
calico_cni_image_repo: "{{ registry_host }}/calico-cni"
calico_cni_image_tag: "v{{ calico_cni_version }}"
calico_policy_image_repo: "{{ registry_host }}/calico-kube-controllers"
calico_policy_image_tag: "v{{ calico_policy_version }}"
calico_typha_image_repo: "{{ registry_host }}/calico-typha"
calico_typha_image_tag: "v{{ calico_typha_version }}"
calico_apiserver_image_repo: "{{ registry_host }}/calico-apiserver"
calico_apiserver_image_tag: "v{{ calico_apiserver_version }}"

# ========================= 版本号统一配置 =========================
kube_version: 1.34.3
calico_version: 3.30.6
etcd_version: 3.5.26
runc_version: 1.3.4
containerd_version: 2.2.1
nerdctl_version: 2.2.1
cni_version: 1.8.0
crictl_version: 1.34.0
helm_version: 3.18.4
yq_version: 4.42.1
skopeo_version: 1.16.1
prometheus_operator_crds_version: 0.84.0

# ========================= 二进制下载地址 =========================
kubeadm_download_url: "{{ files_repo }}/dl.k8s.io/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubeadm"
kubectl_download_url: "{{ files_repo }}/dl.k8s.io/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubectl"
kubelet_download_url: "{{ files_repo }}/dl.k8s.io/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubelet"
cni_download_url: "{{ files_repo }}/github.com/containernetworking/plugins/releases/download/v{{ cni_version }}/cni-plugins-linux-{{ image_arch }}-v{{ cni_version }}.tgz"
crictl_download_url: "{{ files_repo }}/github.com/kubernetes-sigs/cri-tools/releases/download/v{{ crictl_version }}/crictl-v{{ crictl_version }}-{{ ansible_system | lower }}-{{ image_arch }}.tar.gz"
etcd_download_url: "{{ files_repo }}/github.com/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-{{ image_arch }}.tar.gz"
runc_download_url: "{{ files_repo }}/github.com/opencontainers/runc/releases/download/v{{ runc_version }}/runc.{{ image_arch }}"
containerd_download_url: "{{ files_repo }}/github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-{{ image_arch }}.tar.gz"
nerdctl_download_url: "{{ files_repo }}/github.com/containerd/nerdctl/releases/download/v{{ nerdctl_version }}/nerdctl-{{ nerdctl_version }}-{{ ansible_system | lower }}-{{ image_arch }}.tar.gz"
helm_download_url: "{{ files_repo }}/get.helm.sh/helm-v{{ helm_version }}-linux-{{ image_arch }}.tar.gz"
calicoctl_download_url: "{{ files_repo }}/github.com/projectcalico/calico/releases/download/v{{ calico_version }}/calicoctl-linux-{{ image_arch }}"
calico_crds_download_url: "{{ files_repo }}/github.com/projectcalico/calico/archive/v{{ calico_version }}.tar.gz"
yq_download_url: "{{ files_repo }}/github.com/mikefarah/yq/releases/download/v{{ yq_version }}/yq_linux_{{ image_arch }}"
skopeo_download_url: "{{ files_repo }}/github.com/lework/skopeo-binary/releases/download/v{{ skopeo_version }}/skopeo-linux-{{ image_arch }}"
prometheus_operator_crds_download_url: "{{ files_repo }}/github.com/prometheus-operator/prometheus-operator/releases/download/v{{ prometheus_operator_crds_version }}/stripped-down-crds.yaml"

# ========================= containerd 私有仓库认证（当前有效变量） =========================
# 镜像拉取镜像站配置（以阿里仓库作为 docker.io / quay.io / ghcr.io / registry.k8s.io 的镜像源）
containerd_registries_mirrors:
  - prefix: registry.cn-hangzhou.aliyuncs.com
    mirrors:
      - host: "https://registry.cn-hangzhou.aliyuncs.com"
        capabilities: ["pull", "resolve"]
        skip_verify: false
        header:
          Authorization: "Basic {{ (registry_username ~ ':' ~ registry_password) | b64encode }}"
  - prefix: docker.io
    mirrors:
      - host: "https://registry.cn-hangzhou.aliyuncs.com"
        capabilities: ["pull", "resolve"]
        skip_verify: false
  - prefix: quay.io
    mirrors:
      - host: "https://registry.cn-hangzhou.aliyuncs.com"
        capabilities: ["pull", "resolve"]
        skip_verify: false
  - prefix: ghcr.io
    mirrors:
      - host: "https://registry.cn-hangzhou.aliyuncs.com"
        capabilities: ["pull", "resolve"]
        skip_verify: false
  - prefix: registry.k8s.io
    mirrors:
      - host: "https://registry.cn-hangzhou.aliyuncs.com"
        capabilities: ["pull", "resolve"]
        skip_verify: false

# registry 认证（推荐改为 ansible-vault，不要明文）
containerd_registry_auth:
  - registry: registry.cn-hangzhou.aliyuncs.com
    username: "{{ registry_username }}"
    password: "{{ registry_password }}"
