# Single-node inventory derived from inventory/mycluster
# Use this inventory when you want one node to run control plane, etcd and workload roles.

[all:vars]
ansible_user=root
ansible_ssh_pass=Pythonvip1@
ansible_become=true
ansible_become_user=root
ansible_become_pass=Pythonvip1@
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_ssh_extra_args='-o UserKnownHostsFile=/dev/null'

[kube_control_plane]
master1 ansible_host=10.222.9.154

[etcd]
master1

[kube_node]
master1

[k8s_cluster:children]
kube_control_plane
kube_node
