---
- name: Validate container engine
  import_role:
    name: container-engine/validate-container-engine
  tags:
    - container-engine
    - validate-container-engine

- name: Container runtimes
  include_role:
    name: "container-engine/{{ item.role }}"
    apply:
      tags:
        - container-engine
        - "{{ item.role }}"
  loop:
    - { role: 'kata-containers', enabled: "{{ kata_containers_enabled }}" }
    - { role: 'gvisor', enabled: "{{ gvisor_enabled and container_manager in ['docker', 'containerd'] }}" }
    - { role: 'crun', enabled: "{{ crun_enabled }}" }
    - { role: 'youki', enabled: "{{ youki_enabled and container_manager == 'crio' }}" }
  when: item.enabled
  tags:
    - container-engine
    - kata-containers
    - gvisor
    - crun
    - youki

- name: Container Manager
  include_role:
    name: "container-engine/{{ _container_manager_map[container_manager] }}"
    apply:
      tags:
        - container-engine
        - "{{ container_manager }}"
  vars:
    _container_manager_map:
      docker: cri-dockerd
      containerd: containerd
      crio: cri-o
  when: container_manager in _container_manager_map
  tags:
    - container-engine
    - containerd
    - crio
    - docker
