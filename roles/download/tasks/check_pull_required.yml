---
# node_image_list is populated once before the download loop in main.yml as a list of dicts:
# [{'Repository': 'registry.k8s.io/pause', 'Tag': '3.10.1', 'Digest': 'sha256:abc...'}, ...]
# This avoids running the image-info command once per image and enables proper digest comparison.

- name: Check_pull_required | Set pull_required by tag
  set_fact:
    pull_required: >-
      {{ (node_image_list
          | selectattr('Repository', 'equalto',
              image_reponame | regex_replace('^docker\.io/(library/)?', '') | split(':') | first
              if not pull_by_digest else
              image_reponame | regex_replace('^docker\.io/(library/)?', '') | split('@') | first)
          | selectattr('Tag', 'equalto', download.tag)
          | list | length) == 0 }}
  when:
    - not download_always_pull
    - not pull_by_digest

- name: Check_pull_required | Set pull_required by digest
  set_fact:
    pull_required: >-
      {{ (node_image_list
          | selectattr('Digest', 'equalto', 'sha256:' ~ download.sha256)
          | list | length) == 0 }}
  when:
    - not download_always_pull
    - pull_by_digest
