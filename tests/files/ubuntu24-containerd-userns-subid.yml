---
# Instance settings
cloud_image: ubuntu-2404
mode: all-in-one
vm_memory: 1800

# Kubespray settings
auto_renew_certificates: true

# Currently ipvs not available on KVM: https://packages.ubuntu.com/search?suite=noble&arch=amd64&mode=exactfilename&searchon=contents&keywords=ip_vs_sh.ko
kube_proxy_mode: iptables
enable_nodelocaldns: false

# Explicitly pin to containerd 2.x for this feature testcase.
containerd_version: "2.2.1"
containerd_userns_subid_enable: true
containerd_userns_subid_user: kubelet
containerd_userns_subid_create_local_user: true
containerd_userns_subuid_start: 2130706432
containerd_userns_subuid_length: 16777216
containerd_userns_subgid_start: 2130706432
containerd_userns_subgid_length: 16777216

containerd_registries_mirrors:
  - prefix: docker.io
    mirrors:
      - host: https://mirror.gcr.io
        capabilities: ["pull", "resolve"]
        skip_verify: false
  - prefix: 172.19.16.11:5000
    mirrors:
      - host: http://172.19.16.11:5000
        capabilities: ["pull", "resolve", "push"]
        skip_verify: true

kube_reserved: true
system_reserved: true
