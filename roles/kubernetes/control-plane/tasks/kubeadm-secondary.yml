---
- name: Set kubeadm_discovery_address
  set_fact:
    # noqa: jinja[spacing]
    kubeadm_discovery_address: >-
      {%- if "127.0.0.1" in kube_apiserver_endpoint or "localhost" in kube_apiserver_endpoint -%}
      {{ first_kube_control_plane_address | ansible.utils.ipwrap }}:{{ kube_apiserver_port }}
      {%- else -%}
      {{ kube_apiserver_endpoint | regex_replace('https://', '') }}
      {%- endif %}
  tags:
    - facts

- name: Obtain kubeadm certificate key for joining control planes nodes
  when:
    - not kube_external_ca_mode
  run_once: true
  block:
    - name: Upload certificates so they are fresh and not expired
      command: >-
        {{ bin_dir }}/kubeadm init phase
        --config {{ kube_config_dir }}/kubeadm-config.yaml
        upload-certs
        --upload-certs
      register: kubeadm_upload_cert
      delegate_to: "{{ first_kube_control_plane }}"

    - name: Parse certificate key if not set
      set_fact:
        kubeadm_certificate_key: "{{ kubeadm_upload_cert.stdout_lines[-1] | trim }}"

- name: Wait for k8s apiserver
  wait_for:
    host: "{{ kubeadm_discovery_address | regex_replace('\\]?:\\d+$', '') | regex_replace('^\\[', '') }}"
    port: "{{ kubeadm_discovery_address.split(':')[-1] }}"
    timeout: 180


- name: Check already run
  debug:
    msg: "{{ kubeadm_already_run.stat.exists }}"

- name: Reset cert directory
  shell: >-
    if [ -f /etc/kubernetes/manifests/kube-apiserver.yaml ]; then
    {{ bin_dir }}/kubeadm reset -f --cert-dir {{ kube_cert_dir }};
    fi
  environment:
    PATH: "{{ bin_dir }}:{{ ansible_env.PATH }}"
  when:
    - inventory_hostname != first_kube_control_plane
    - kubeadm_already_run is not defined or not kubeadm_already_run.stat.exists
    - not kube_external_ca_mode

- name: Get kubeconfig for join discovery process
  command: "{{ kubectl }} -n kube-public get cm cluster-info -o jsonpath='{.data.kubeconfig}'"
  register: kubeconfig_file_discovery
  run_once: true
  delegate_to: "{{ groups['kube_control_plane'] | first }}"
  when:
    - kubeadm_use_file_discovery
    - kubeadm_already_run is not defined or not kubeadm_already_run.stat.exists

- name: Copy discovery kubeconfig
  copy:
    dest: "{{ kube_config_dir }}/cluster-info-discovery-kubeconfig.yaml"
    content: "{{ kubeconfig_file_discovery.stdout }}"
    owner: "root"
    mode: "0644"
  when:
    - inventory_hostname != first_kube_control_plane
    - kubeadm_use_file_discovery
    - kubeadm_already_run is not defined or not kubeadm_already_run.stat.exists

- name: Create kubeadm ControlPlane config
  template:
    src: "kubeadm-controlplane.yaml.j2"
    dest: "{{ kube_config_dir }}/kubeadm-controlplane.yaml"
    mode: "0640"
    backup: true
    validate: "{{ kubeadm_config_validate_enabled | ternary(bin_dir + '/kubeadm config validate --config %s', omit) }}"
  when:
    - inventory_hostname != first_kube_control_plane
    - not kubeadm_already_run.stat.exists

- name: Joining control plane node to the cluster.
  when:
    - inventory_hostname != first_kube_control_plane
    - kubeadm_already_run is not defined or not kubeadm_already_run.stat.exists
  environment:
    PATH: "{{ bin_dir }}:{{ ansible_env.PATH }}"
  block:
    - name: Joining control plane node to the cluster. (1st try)
      command: >-
        {{ bin_dir }}/kubeadm join
        --config {{ kube_config_dir }}/kubeadm-controlplane.yaml
        --ignore-preflight-errors={{ kubeadm_ignore_preflight_errors | join(',') }}
        --skip-phases={{ kubeadm_join_phases_skip | join(',') }}
      register: kubeadm_join_control_plane
      throttle: 1
  rescue:
    - name: Reset cert directory before retrying control plane join
      command: "{{ bin_dir }}/kubeadm reset -f --cert-dir {{ kube_cert_dir }}"
      environment:
        PATH: "{{ bin_dir }}:{{ ansible_env.PATH }}"
    - name: Joining control plane node to the cluster. (retry)
      command: >-
        {{ bin_dir }}/kubeadm join
        --config {{ kube_config_dir }}/kubeadm-controlplane.yaml
        --ignore-preflight-errors={{ _ignore_errors | flatten | join(',') }}
        --skip-phases={{ kubeadm_join_phases_skip | join(',') }}
      vars:
        _errors_from_first_try:
          - 'FileAvailable--etc-kubernetes-manifests-kube-controller-manager.yaml'
          - 'FileAvailable--etc-kubernetes-manifests-kube-scheduler.yaml'
          - 'FileAvailable--etc-kubernetes-manifests-kube-apiserver.yaml'
          - 'Port-10250'
        _ignore_errors:
          - "{{ kubeadm_ignore_preflight_errors }}"
          - "{{ _errors_from_first_try if 'all' not in kubeadm_ignore_preflight_errors else [] }}"
      register: kubeadm_join_control_plane
      retries: 2
      until: kubeadm_join_control_plane is succeeded
      throttle: 1

- name: Wait for new control plane nodes to be Ready
  when:
    - kubeadm_already_run.stat.exists
    - kube_network_plugin not in ['cni', 'none']
  run_once: true
  command: >
    {{ kubectl }} get nodes --selector node-role.kubernetes.io/control-plane
    -o jsonpath-as-json="{.items[*].status.conditions[?(@.type == 'Ready')]}"
  register: control_plane_node_ready_conditions
  retries: "{{ control_plane_node_become_ready_tries }}"
  delay: 5
  delegate_to: "{{ groups['kube_control_plane'][0] }}"
  until: >
    control_plane_node_ready_conditions.stdout
    | from_json | selectattr('status', '==', 'True')
    | length == (groups['kube_control_plane'] | length)
