---
# Upgrade strategy for rolling cluster upgrades.
# See docs/operations/upgrade-strategies.md for a full comparison.
# See docs/developers/graceful-rolling-strategy.md for the design rationale of
# the graceful_rolling strategy.

# Strategy plugin used for upgrade plays.
# Possible values:
#   linear           (default) - classic Ansible batch behaviour. Nodes are
#                                upgraded in batches of upgrade_node_concurrency.
#                                All nodes in a batch must finish before the
#                                next batch starts. Battle-tested and predictable.
#   graceful_rolling            - opt-in sliding-window strategy: a finished node
#                                immediately opens a slot for the next waiting
#                                node, avoiding the batch synchronisation
#                                bottleneck and PodDisruptionBudget deadlocks.
#                                See docs/operations/upgrade-strategies.md.
upgrade_strategy: linear

# Maximum number of control-plane nodes upgraded simultaneously.
# Must stay at 1 to preserve etcd/API-server quorum during the upgrade.
upgrade_control_plane_concurrency: 1

# Maximum number of worker nodes upgraded simultaneously.
# Accepts a plain integer or a percentage string (e.g. "20%" of total hosts).
# Default matches the original serial: "{{ serial | default('20%') }}" behaviour.
upgrade_node_concurrency: "20%"

# Maximum number of non-cluster nodes (standalone etcd / calico_rr) upgraded
# simultaneously.
# Accepts a plain integer or a percentage string (e.g. "20%" of total hosts).
# Default matches the original serial: "{{ serial | default('20%') }}" behaviour.
upgrade_non_cluster_concurrency: "20%"

# Maximum number of nodes in the combined calico + external cloud-controller
# upgrade play running simultaneously.
# Accepts a plain integer or a percentage string (e.g. "20%" of total hosts).
# Default matches the original serial: "{{ serial | default('20%') }}" behaviour.
upgrade_network_concurrency: "20%"
