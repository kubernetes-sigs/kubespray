---
# Instance settings
cloud_image: ubuntu-2404
cluster_layout:
  - node_groups: ['kube_control_plane', 'etcd', 'kube_node']
  - node_groups: ['kube_control_plane', 'etcd', 'kube_node']
  - node_groups: ['etcd', 'kube_node']

# Kubespray settings
ipv4_stack: false
ipv6_stack: true
kube_network_plugin: calico
etcd_deployment_type: kubeadm
kube_proxy_mode: iptables
enable_nodelocaldns: false
