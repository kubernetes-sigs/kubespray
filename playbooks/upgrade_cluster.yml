---
- name: Common tasks for every playbooks
  import_playbook: boilerplate.yml

- name: Gather facts
  import_playbook: internal_facts.yml

- name: Download images to ansible host cache via first kube_control_plane node
  hosts: kube_control_plane[0]
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  roles:
    - { role: kubespray_defaults, when: "not skip_downloads and download_run_once and not download_localhost"}
    - { role: kubernetes/preinstall, tags: preinstall, when: "not skip_downloads and download_run_once and not download_localhost" }
    - { role: download, tags: download, when: "not skip_downloads and download_run_once and not download_localhost" }

- name: Prepare nodes for upgrade
  hosts: k8s_cluster:etcd:calico_rr
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  roles:
    - { role: kubespray_defaults }
    - { role: kubernetes/preinstall, tags: preinstall }
    - { role: download, tags: download, when: "not skip_downloads" }

- name: Upgrade container engine on non-cluster nodes
  hosts: etcd:calico_rr:!k8s_cluster
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  strategy: "{{ upgrade_strategy | default('linear') }}"
  vars:
    graceful_rolling_concurrency: "{{ upgrade_non_cluster_concurrency | default(1) }}"
  pre_tasks:
    - name: Validate upgrade_strategy value
      # Acceptable values:
      #   - built-in short names: linear, free, host_pinned (and any other ansible-core built-in)
      #   - short name 'graceful_rolling' — only valid when strategy_plugins = ./plugins/strategy
      #     is set in ansible.cfg (repo-clone mode)
      #   - FQCN 'kubernetes_sigs.kubespray.graceful_rolling' — required for collection installs
      # If you see "ERROR! [unknown strategy]" after this task, you are running kubespray from a
      # collection install and must set: upgrade_strategy: kubernetes_sigs.kubespray.graceful_rolling
      ansible.builtin.assert:
        that:
          - upgrade_strategy | default('linear') != ''
        success_msg: "upgrade_strategy='{{ upgrade_strategy | default('linear') }}' accepted"
        fail_msg: "upgrade_strategy must not be empty. Use 'linear' or 'graceful_rolling' (repo clone) or 'kubernetes_sigs.kubespray.graceful_rolling' (collection install)."
      run_once: true
      delegate_to: localhost
      tags: always
  roles:
    - { role: kubespray_defaults }
    - { role: container-engine, tags: "container-engine", when: deploy_container_engine }

- name: Install etcd
  vars:
    etcd_cluster_setup: true
    etcd_events_cluster_setup: "{{ etcd_events_cluster_enabled }}"
  import_playbook: install_etcd.yml

- name: Handle upgrades to control plane components first to maintain backwards compat.
  gather_facts: false
  hosts: kube_control_plane
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  strategy: "{{ upgrade_strategy | default('linear') }}"
  vars:
    graceful_rolling_concurrency: "{{ upgrade_control_plane_concurrency | default(1) }}"
  roles:
    - { role: kubespray_defaults }
    - { role: upgrade/pre-upgrade, tags: pre-upgrade }
    - { role: upgrade/system-upgrade, tags: system-upgrade }
    - { role: download, tags: download, when: "system_upgrade and system_upgrade_reboot != 'never' and not skip_downloads" }
    - { role: kubernetes-apps/kubelet-csr-approver, tags: kubelet-csr-approver }
    - { role: container-engine, tags: "container-engine", when: deploy_container_engine }
    - { role: kubernetes/node, tags: node }
    - { role: kubernetes/control-plane, tags: control-plane, upgrade_cluster_setup: true }
    - { role: kubernetes/client, tags: client }
    - { role: kubernetes/node-label, tags: node-label }
    - { role: kubernetes/node-taint, tags: node-taint }
    - { role: kubernetes-apps/cluster_roles, tags: cluster-roles }
    - { role: kubernetes-apps, tags: csi-driver }
    - { role: upgrade/post-upgrade, tags: post-upgrade }

- name: Upgrade calico and external cloud provider on all control plane nodes, calico-rrs, and nodes
  hosts: kube_control_plane:calico_rr:kube_node
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  strategy: "{{ upgrade_strategy | default('linear') }}"
  vars:
    graceful_rolling_concurrency: "{{ upgrade_network_concurrency | default('20%') }}"
    graceful_rolling_per_group:
      kube_control_plane: "{{ upgrade_control_plane_concurrency | default(1) }}"
      kube_node: "{{ upgrade_network_concurrency | default('20%') }}"
      calico_rr: "{{ upgrade_non_cluster_concurrency | default('20%') }}"
  roles:
    - { role: kubespray_defaults }
    - { role: kubernetes-apps/external_cloud_controller, tags: external-cloud-controller }
    - { role: network_plugin, tags: network }
    - { role: kubernetes-apps/policy_controller, tags: policy-controller }

- name: Finally handle worker upgrades, based on given batch size
  hosts: kube_node:calico_rr:!kube_control_plane
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  # For non-graceful_rolling strategies (e.g. linear), serial: enforces the batch size so that
  # upgrade_node_concurrency is respected. graceful_rolling manages concurrency internally via
  # graceful_rolling_concurrency and must receive all hosts at once ('100%') to run its sliding window.
  serial: "{{ upgrade_node_concurrency | default('20%') if (upgrade_strategy | default('linear')) != 'graceful_rolling' else '100%' }}"
  strategy: "{{ upgrade_strategy | default('linear') }}"
  vars:
    graceful_rolling_concurrency: "{{ upgrade_node_concurrency | default('20%') }}"
  roles:
    - { role: kubespray_defaults }
    - { role: upgrade/pre-upgrade, tags: pre-upgrade }
    - { role: upgrade/system-upgrade, tags: system-upgrade }
    - { role: download, tags: download, when: "system_upgrade and system_upgrade_reboot != 'never' and not skip_downloads" }
    - { role: container-engine, tags: "container-engine", when: deploy_container_engine }
    - { role: kubernetes/node, tags: node }
    - { role: kubernetes/kubeadm, tags: kubeadm }
    - { role: kubernetes/node-label, tags: node-label }
    - { role: kubernetes/node-taint, tags: node-taint }
    - { role: upgrade/post-upgrade, tags: post-upgrade }

- name: Patch Kubernetes for Windows
  hosts: kube_control_plane[0]
  gather_facts: false
  any_errors_fatal: true
  environment: "{{ proxy_disable_env }}"
  roles:
    - { role: kubespray_defaults }
    - { role: win_nodes/kubernetes_patch, tags: ["control-plane", "win_nodes"] }

- name: Install Calico Route Reflector
  hosts: calico_rr
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  roles:
    - { role: kubespray_defaults }
    - { role: network_plugin/calico/rr, tags: network }

- name: Install Kubernetes apps
  hosts: kube_control_plane
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  roles:
    - { role: kubespray_defaults }
    - { role: kubernetes-apps/ingress_controller, tags: ingress-controller }
    - { role: kubernetes-apps/external_provisioner, tags: external-provisioner }
    - { role: kubernetes-apps, tags: apps }

- name: Apply resolv.conf changes now that cluster DNS is up
  hosts: k8s_cluster
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env }}"
  roles:
    - { role: kubespray_defaults }
    - { role: kubernetes/preinstall, when: "dns_mode != 'none' and resolvconf_mode == 'host_resolvconf'", tags: resolvconf, dns_late: true }
