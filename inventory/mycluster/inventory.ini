# This inventory describe a HA typology with stacked etcd (== same nodes as control plane)
# and 3 worker nodes
# See https://docs.ansible.com/ansible/latest/inventory_guide/intro_inventory.html
# for tips on building your # inventory

# Configure 'ip' variable to bind kubernetes services on a different ip than the default iface
# We should set etcd_member_name for etcd cluster. The node that are not etcd members do not need to set the value,
# or can set the empty string value.
[kube_control_plane]
master1 ansible_host=10.222.9.154  # ip=10.222.9.154 etcd_member_name=etcd1
master2 ansible_host=10.222.9.155  # ip=10.222.9.155 etcd_member_name=etcd2
master3 ansible_host=10.222.9.156 # ip=10.222.9.156  etcd_member_name=etcd3
# 为 [all] 组中的所有主机设置通用连接变量
[all:vars]
# SSH 登录用户名
ansible_user=root
# SSH 登录密码（不推荐明文存储，生产环境建议使用 SSH 密钥）
ansible_ssh_pass=Pythonvip1@
# 是否启用特权升级（sudo）
ansible_become=true
# 特权升级目标用户（通常为 root）
ansible_become_user=root
# sudo 密码（若用户无需密码即可 sudo，可省略此项）
ansible_become_pass=Pythonvip1@
# 👇 添加以下两行（不推荐生产使用）这会让 SSH 自动接受任何主机密钥，并忽略 known_hosts 文件。

ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_ssh_extra_args='-o UserKnownHostsFile=/dev/null'
# 定义 Kubernetes 控制平面节点（运行 apiserver、controller-manager、scheduler）
[kube_control_plane]
master1
master2
master3

# 定义 etcd 集群节点（此处复用控制平面节点，构成 co-located 架构）
[etcd]
master1
master2
master3

# 定义工作节点（运行 kubelet、容器运行时等，此处复用 master 节点实现 All-in-One HA）
[kube_node]
master1
master2
master3

# 定义顶层集群组，包含控制平面和工作节点（Kubespray 要求此结构）
[k8s_cluster:children]
kube_control_plane
kube_node

