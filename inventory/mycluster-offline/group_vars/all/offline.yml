# Offline "ultra-fast lane" profile:
# - binaries are downloaded from DaoCloud's files mirror
# - container images are always pulled from the local registry
# - if you previously synced images from swr.cn-north-4.myhuaweicloud.com/ddn-k8s,
#   retag/push them into 192.168.194.226:5000 with the same image suffix
#
# Example:
# swr.cn-north-4.myhuaweicloud.com/ddn-k8s/kube-apiserver:v1.34.3
# -> 192.168.194.226:5000/kube-apiserver:v1.34.3

# --- 1. Basic registry and containerd settings ---
registry_host: "192.168.194.226:5000"
files_repo: "https://files.m.daocloud.io"

download_cache_dir: "{{ inventory_dir }}/cache"
download_run_once: false
download_localhost: false
download_force_cache: false

containerd_use_config_path: true
containerd_registries_hosts_exclusive: false
containerd_insecure_registries:
  "192.168.194.226:5000": "http://192.168.194.226:5000"

# Redirect all container image sources to the local registry.
kube_image_repo: "{{ registry_host }}"
kubeadm_image_repo: "{{ kube_image_repo }}"
gcr_image_repo: "{{ registry_host }}"
github_image_repo: "{{ registry_host }}"
docker_image_repo: "{{ registry_host }}"
quay_image_repo: "{{ registry_host }}"

# --- 2. Versions ---
kube_version: 1.34.3
runc_version: 1.3.4
containerd_version: 2.2.1
nerdctl_version: 2.2.1
cni_version: 1.8.0
crictl_version: 1.34.0
etcd_version: 3.5.26
helm_version: 3.18.4
calico_version: 3.30.6
yq_version: 4.42.1
skopeo_version: 1.16.1
prometheus_operator_crds_version: 0.84.0

# --- 3. Download URLs ---
kubeadm_download_url: "{{ files_repo }}/dl.k8s.io/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubeadm"
kubectl_download_url: "{{ files_repo }}/dl.k8s.io/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubectl"
kubelet_download_url: "{{ files_repo }}/dl.k8s.io/release/v{{ kube_version }}/bin/linux/{{ image_arch }}/kubelet"
cni_download_url: "{{ files_repo }}/github.com/containernetworking/plugins/releases/download/v{{ cni_version }}/cni-plugins-linux-{{ image_arch }}-v{{ cni_version }}.tgz"
crictl_download_url: "{{ files_repo }}/github.com/kubernetes-sigs/cri-tools/releases/download/v{{ crictl_version }}/crictl-v{{ crictl_version }}-{{ ansible_system | lower }}-{{ image_arch }}.tar.gz"
etcd_download_url: "{{ files_repo }}/github.com/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-{{ image_arch }}.tar.gz"
runc_download_url: "{{ files_repo }}/github.com/opencontainers/runc/releases/download/v{{ runc_version }}/runc.{{ image_arch }}"
containerd_download_url: "{{ files_repo }}/github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-{{ image_arch }}.tar.gz"
nerdctl_download_url: "{{ files_repo }}/github.com/containerd/nerdctl/releases/download/v{{ nerdctl_version }}/nerdctl-{{ nerdctl_version }}-linux-{{ image_arch }}.tar.gz"
helm_download_url: "{{ files_repo }}/get.helm.sh/helm-v{{ helm_version }}-linux-{{ image_arch }}.tar.gz"
calicoctl_download_url: "{{ files_repo }}/github.com/projectcalico/calico/releases/download/v{{ calico_version }}/calicoctl-linux-{{ image_arch }}"
calico_crds_download_url: "{{ files_repo }}/github.com/projectcalico/calico/archive/v{{ calico_version }}.tar.gz"
yq_download_url: "{{ files_repo }}/github.com/mikefarah/yq/releases/download/v{{ yq_version }}/yq_linux_{{ image_arch }}"
skopeo_download_url: "{{ files_repo }}/github.com/lework/skopeo-binary/releases/download/v{{ skopeo_version }}/skopeo-linux-{{ image_arch }}"
prometheus_operator_crds_download_url: "{{ files_repo }}/github.com/prometheus-operator/prometheus-operator/releases/download/v{{ prometheus_operator_crds_version }}/stripped-down-crds.yaml"
